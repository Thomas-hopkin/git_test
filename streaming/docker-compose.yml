version: "3.8"

services:

  # neko-rooms: manages one Docker container per player session
  # Exposes REST API on :3000, creates containers from the runepvp-client image
  neko-rooms:
    image: m1k1o/neko-rooms:latest
    restart: unless-stopped
    ports:
      - "3000:3000"
      # WebRTC UDP ports — each room gets one port from this range
      - "52000-52100:52000-52100/udp"
      - "52000-52100:52000-52100/tcp"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      NEKO_ROOMS_BIND: ":3000"
      # Image built from our Dockerfile (run: docker build -t runepvp-client ./streaming)
      NEKO_ROOMS_NEKO_IMAGE: "runepvp-client:latest"
      # Public IP of your VPS — critical for WebRTC NAT traversal
      NEKO_ROOMS_NAT1TO1: "${VPS_IP}"
      # Port range allocated to rooms (one port per session)
      NEKO_ROOMS_PORT_FROM: "52000"
      NEKO_ROOMS_PORT_TO: "52100"

  # session-manager: production front-end to neko-rooms. Keeps a warm container
  # pool, enforces a capacity cap with a fair queue, reaps dead sessions, and
  # exposes a simple API the website calls. This is what makes browser play
  # robust instead of a fragile one-container-per-click prototype.
  session-manager:
    build: ./session-manager
    restart: unless-stopped
    ports:
      - "5000:5000"
    depends_on:
      - neko-rooms
    environment:
      PORT: "5000"
      # Reached over the internal compose network, so use the service name.
      NEKO_ROOMS_URL: "http://neko-rooms:3000"
      NEKO_IMAGE: "runepvp-client:latest"
      # Game server as seen from inside a container — VPS public IP, not localhost.
      GAME_HOST: "${GAME_HOST}"
      GAME_PORT: "${GAME_PORT:-43594}"
      # Tune these to your VPS size (see session-manager/.env.example).
      MAX_SESSIONS: "${MAX_SESSIONS:-4}"
      POOL_SIZE: "${POOL_SIZE:-1}"
